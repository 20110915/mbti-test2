<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性格测试中心</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23667eea;stop-opacity:1' /><stop offset='100%' style='stop-color:%23764ba2;stop-opacity:1' /></linearGradient></defs><rect width='100' height='100' fill='url(%23grad)' rx='20'/><text x='50' y='70' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>✨</text></svg>">
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
            color: white;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header h1 i {
            font-size: 52px;
            animation: sparkle 2s ease-in-out infinite;
        }

        .header p {
            font-size: 18px;
            opacity: 0.95;
            font-weight: 300;
        }

        .tests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .test-card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .test-card:nth-child(1) { animation-delay: 0.1s; }
        .test-card:nth-child(2) { animation-delay: 0.2s; }
        .test-card:nth-child(3) { animation-delay: 0.3s; }

        .test-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3);
        }

        .test-icon {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 40px;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .test-card:hover .test-icon {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .test-card h3 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .test-card p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .test-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .test-card:hover .test-button {
            transform: scale(1.05);
        }

        .coming-soon {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 60px 30px;
            text-align: center;
            grid-column: 1 / -1;
        }

        .coming-soon-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .coming-soon h3 {
            font-size: 22px;
            color: #999;
            font-weight: 600;
        }

        .coming-soon p {
            color: #bbb;
            margin-top: 10px;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
                gap: 10px;
            }

            .header h1 i {
                font-size: 36px;
            }

            .header p {
                font-size: 16px;
            }

            .tests-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .test-icon {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-sparkles"></i>性格测试中心</h1>
            <p>探索你的性格特质，了解真实的自己</p>
        </div>

        <div class="tests-grid">
            <a href="mbti-test.html" class="test-card">
                <div class="test-icon"><i class="fas fa-brain"></i></div>
                <h3>MBTI 性格测试</h3>
                <p>通过 20 个精选问题，精准分析你的性格类型，帮助你更好地了解自己和他人。</p>
                <button class="test-button">开始测试</button>
            </a>

            <div class="test-card" style="cursor: default;">
                <div class="test-icon"><i class="fas fa-palette"></i></div>
                <h3>九型人格测试</h3>
                <p>九型人格理论是一套深刻的性格分类系统，帮助你认识自己的动机和行为模式。</p>
                <button class="test-button" style="opacity: 0.5; cursor: not-allowed;">即将上线</button>
            </div>

            <div class="test-card" style="cursor: default;">
                <div class="test-icon"><i class="fas fa-briefcase"></i></div>
                <h3>职业匹配测试</h3>
                <p>根据你的性格和兴趣，推荐最适合你的职业方向和发展路径。</p>
                <button class="test-button" style="opacity: 0.5; cursor: not-allowed;">即将上线</button>
            </div>
        </div>

        <div class="coming-soon">
            <div class="coming-soon-icon">🚀</div>
            <h3>更多精彩测试敬请期待</h3>
            <p>我们正在开发更多有趣且有深度的性格测试，敬请关注！</p>
        </div>

        <div class="footer">
            <p>© 2026 性格测试中心 | 用科学的方法了解你自己</p>
        </div>
    </div>
</body>
</html>
