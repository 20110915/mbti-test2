<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 性格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            color: #1a1a1a;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .intro-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .intro-box h3 {
            color: #1a1a1a;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .intro-box ul {
            color: #555;
            font-size: 14px;
            line-height: 1.8;
            list-position: inside;
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
            text-align: right;
        }

        .test-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .question-number {
            color: #999;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .question {
            margin-bottom: 40px;
            display: none;
        }

        .question.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        .question h2 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            cursor: pointer;
        }

        .option input[type="radio"] {
            display: none;
        }

        .option label {
            display: block;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        .option input[type="radio"]:checked + label {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            color: #667eea;
        }

        .option label:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-prev {
            background: #f0f0f0;
            color: #333;
        }

        .btn-prev:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-container {
            display: none;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        .result-container.show {
            display: block;
        }

        .result-type {
            font-size: 72px;
            color: #667eea;
            font-weight: 700;
            margin: 30px 0;
            letter-spacing: 8px;
        }

        .result-title {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .result-desc {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .result-traits {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 12px;
            margin: 30px 0;
            text-align: left;
        }

        .result-traits h3 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .traits-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .trait-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            border-left: 3px solid #667eea;
        }

        .score-analysis {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
            border: 2px solid #f0f0f0;
        }

        .score-analysis h4 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .score-bar-group {
            margin-bottom: 15px;
        }

        .score-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .score-bar {
            background: #e0e0e0;
            border-radius: 6px;
            height: 8px;
            overflow: hidden;
        }

        .score-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .result-actions {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .result-actions button {
            flex: 1;
            padding: 14px 24px;
        }

        .btn-again {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-again:hover {
            background: #f8f9ff;
        }

        .btn-home {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .test-content {
                padding: 20px;
            }

            .question h2 {
                font-size: 20px;
            }

            .traits-grid {
                grid-template-columns: 1fr;
            }

            .result-type {
                font-size: 48px;
                letter-spacing: 4px;
            }

            .buttons {
                flex-direction: column;
            }

            .result-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 MBTI 性格测试</h1>
            <p>通过科学的心理学理论，20 个精选问题，精准分析你的性格类型</p>
        </div>

        <div class="test-content">
            <div id="intro">
                <div class="intro-box">
                    <h3>📌 测试说明</h3>
                    <ul>
                        <li><strong>20个问题</strong> - 全面评估你的性格特质</li>
                        <li><strong>4个维度</strong> - E/I（外向/内向）、S/N（感觉/直觉）、T/F（思维/情感）、J/P（判断/知觉）</li>
                        <li><strong>16种类型</strong> - 准确识别你的性格归类</li>
                        <li><strong>无对错之分</strong> - 每种类型都有独特的优势和价值</li>
                    </ul>
                </div>
                <button onclick="startTest()" style="width: 100%; padding: 14px 24px; border: none; border-radius: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-size: 16px; font-weight: 600; cursor: pointer;">
                    开始测试
                </button>
            </div>

            <div id="testForm" style="display: none;">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text"><span id="currentQuestion">1</span> / 20</div>
                </div>

                <div id="questionsContainer"></div>

                <div class="buttons">
                    <button class="btn-prev" id="btnPrev" onclick="prevQuestion()" disabled>← 上一题</button>
                    <button class="btn-next" id="btnNext" onclick="nextQuestion()">下一题 →</button>
                </div>
            </div>

            <div id="resultContainer" class="result-container">
                <div class="result-type" id="mbtiType"></div>
                <h2 class="result-title" id="mbtiTitle"></h2>
                <p class="result-desc" id="mbtiDesc"></p>

                <div class="result-traits">
                    <h3>性格特点</h3>
                    <div class="traits-grid" id="traitsGrid"></div>
                </div>

                <div class="score-analysis">
                    <h4>维度得分分析</h4>
                    <div id="scoresAnalysis"></div>
                </div>

                <div class="result-actions">
                    <button class="btn-again" onclick="resetTest()">重新测试</button>
                    <button class="btn-home" onclick="window.location.href='index.html'">返回首页</button>
                </div>
            </div>
        </div>
    </div>

        function initTest() {
            const container = document.getElementById("questionsContainer");

            questions.forEach((q, index) => {

                container.appendChild(questionDiv);
            });
        }

        function startTest() {
            document.getElementById("intro").style.display = "none";
            document.getElementById("testForm").style.display = "block";
            initTest();
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById("progressFill").style.width = progress + "%";
            document.getElementById("currentQuestion").textContent = currentQuestion + 1;
            
            document.getElementById("btnPrev").disabled = currentQuestion === 0;
            document.getElementById("btnNext").textContent = currentQuestion === questions.length - 1 ? "查看结果" : "下一题 →";
        }

        function nextQuestion() {
            const selected = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
            if (!selected) {
                alert("请先选择一个答案");
                return;
            }

            answers[currentQuestion] = selected.value;
            
            if (currentQuestion < questions.length - 1) {
                document.querySelector(".question.active").classList.remove("active");
                currentQuestion++;
                document.querySelectorAll(".question")[currentQuestion].classList.add("active");
                updateProgress();
            } else {
                calculateResult();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                document.querySelector(".question.active").classList.remove("active");
                currentQuestion--;
                document.querySelectorAll(".question")[currentQuestion].classList.add("active");
                updateProgress();
            }
        }

        function calculateResult() {
            // 重置分数
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

            // 根据答案计算分数
            questions.forEach((q, index) => {
                if (answers[index]) {
                    if (answers[index] === "A") {
                        scores[q.pair]++;
                    } else {
                        // B 选项对应的维度反向
                        const dimension = q.dimension;
                        const oppositeType = dimension === "EI" ? (q.pair === "E" ? "I" : "E") :
                                          dimension === "SN" ? (q.pair === "S" ? "N" : "S") :
                                          dimension === "TF" ? (q.pair === "T" ? "F" : "T") :
                                          (q.pair === "J" ? "P" : "J");
                        scores[oppositeType]++;
                    }
                }
            });

            // 确定 MBTI 类型
            const mbti = 
                (scores.E >= scores.I ? "E" : "I") +
                (scores.S >= scores.N ? "S" : "N") +
                (scores.T >= scores.F ? "T" : "F") +
                (scores.J >= scores.P ? "J" : "P");

            showResult(mbti);
        }

        function showResult(mbti) {
            document.getElementById("testForm").style.display = "none";
            document.getElementById("resultContainer").classList.add("show");

            const info = descriptions[mbti];
            document.getElementById("mbtiType").textContent = mbti;
            document.getElementById("mbtiTitle").textContent = info.title;
            document.getElementById("mbtiDesc").textContent = info.desc;

            // 显示特点
            const traitsHtml = info.traits.map(trait => 
                `<div class="trait-item">✓ ${trait}</div>`
            ).join("");
            document.getElementById("traitsGrid").innerHTML = traitsHtml;

            // 显示维度得分
            const scoresHtml = `
                <div class="score-bar-group">
                    <div class="score-label"><span>外向 (E) ← → 内向 (I)</span><span>${scores.E} : ${scores.I}</span></div>
                    <div class="score-bar">
                        <div class="score-fill" style="width: ${(scores.E / (scores.E + scores.I)) * 100}%"></div>
                    </div>
                </div>
                <div class="score-bar-group">
                    <div class="score-label"><span>感觉 (S) ← → 直觉 (N)</span><span>${scores.S} : ${scores.N}</span></div>
                    <div class="score-bar">
                        <div class="score-fill" style="width: ${(scores.S / (scores.S + scores.N)) * 100}%"></div>
                    </div>
                </div>
                <div class="score-bar-group">
                    <div class="score-label"><span>思维 (T) ← → 情感 (F)</span><span>${scores.T} : ${scores.F}</span></div>
                    <div class="score-bar">
                        <div class="score-fill" style="width: ${(scores.T / (scores.T + scores.F)) * 100}%"></div>
                    </div>
                </div>
                <div class="score-bar-group">
                    <div class="score-label"><span>判断 (J) ← → 知觉 (P)</span><span>${scores.J} : ${scores.P}</span></div>
                    <div class="score-bar">
                        <div class="score-fill" style="width: ${(scores.J / (scores.J + scores.P)) * 100}%"></div>
                    </div>
                </div>
            `;
            document.getElementById("scoresAnalysis").innerHTML = scoresHtml;
        }

        function resetTest() {
            currentQuestion = 0;
            answers = {};
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            
            document.getElementById("resultContainer").classList.remove("show");
            document.getElementById("intro").style.display = "block";
            document.getElementById("testForm").style.display = "none";
        }

        // 初始化
        updateProgress();
    </script>
</body>
</html>
